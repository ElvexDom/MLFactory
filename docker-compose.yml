name: mlflow-stack
services:
  # ==============================================================================
  # SERVEUR POSTGRESQL
  # ==============================================================================
  postgres:
    image: postgres:17.8
    container_name: postgres-server
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - mlflow-hub
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw

  # ==============================================================================
  # STOCKAGE S3 MINIO
  # ==============================================================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
    networks:
      - mlflow-hub
    volumes:
      - minio_data:/data:rw

  # ==============================================================================
  # SERVEUR MLFLOW
  # ==============================================================================
  mlflow:
    image: 3lv3x/mlflow:3.10
    # build:
    #   context: src/mlops/
    #   dockerfile: Dockerfile
    container_name: mlflow-server
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - postgres
      - minio
    environment:
      - PGHOST=${POSTGRES_HOST}
      - PGDATABASE=${POSTGRES_DB}
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_ADMIN_USERNAME=${MLFLOW_ADMIN_USERNAME}
      - MLFLOW_ADMIN_PASSWORD=${MLFLOW_ADMIN_PASSWORD}
      - MLFLOW_WORKERS=${MLFLOW_WORKERS}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      - MLFLOW_S3_IGNORE_TLS=${MLFLOW_S3_IGNORE_TLS}
    networks:
      - mlflow-hub
    volumes:
      - mlflow_data:/data:rw

  # ==============================================================================
  # API MLFLOW
  # ==============================================================================
  api:
    build:
      context: src/api/
      dockerfile: Dockerfile
    container_name: mlflow-api
    restart: unless-stopped
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MLFLOW_ADMIN_USERNAME=${MLFLOW_ADMIN_USERNAME}
      - MLFLOW_ADMIN_PASSWORD=${MLFLOW_ADMIN_PASSWORD}
    networks:
      - mlflow-hub

  # ==============================================================================
  # FRONT MLFLOW
  # ==============================================================================
  front:
    build:
      context: src/front/
      dockerfile: Dockerfile
    container_name: mlflow-front
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=${API_URL}
    networks:
      - mlflow-hub

volumes:
  postgres_data:
  minio_data:
  mlflow_data:

networks:
  mlflow-hub: